<!DOCTYPE html>
<html>
<head>
    <title>Advanced Student Predictor</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f5f5f5;
        }

        .container {
            margin-top: 50px;
            max-width: 600px;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0px 0px 10px gray;
        }
    </style>
</head>
<body>

<div class="container">

    <h1 class="text-center mb-4">Student Performance Predictor</h1>

    <form action="/predict" method="post">

        <div class="mb-3">
            <label>Study Hours</label>
            <input type="number" step="any" name="hours" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Attendance (%)</label>
            <input type="number" step="any" name="attendance" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Previous Marks</label>
            <input type="number" step="any" name="previous_marks" class="form-control" required>
        </div>

        <button class="btn btn-primary w-100">Predict</button>

    </form>

    <br>

    <h3>{{ prediction_text }}</h3>
    <p>{{ suggestion }}</p>

    <a href="/history" class="btn btn-success">View History</a>

</div>

</body>
</html>
